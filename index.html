<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium CGPA & SGPA Calculator Online</title>
    <meta name="description" content="Calculate your CGPA and SGPA instantly with our beautiful, modern, and easy-to-use grading calculator. Free and accurate.">
    <meta name="keywords" content="CGPA calculator, SGPA calculator, grade calculator, GPA calculator online, university gpa, college grading">
    <meta name="robots" content="index, follow">
    <meta name="author" content="Student Tools">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <button id="theme-toggle" class="theme-toggle-btn" aria-label="Toggle Theme"></button>

    <main class="container">
        <header>
            <h1>CGPA Calculator</h1>
            <p>Calculate your academic performance with ease</p>
        </header>

        <form id="calculator-form" class="glass-card">
            <div class="form-section">
                <h2>Student Details</h2>
                <div class="input-grid">
                    <div class="input-group">
                        <label for="university">University Name</label>
                        <input list="universities-list" id="university" placeholder="Select or type university" required>
                        <datalist id="universities-list">
                            <option value="Savitribai Phule Pune University (SPPU)"></option>
                            <option value="Mumbai University (MU)"></option>
                            <option value="Shivaji University, Kolhapur"></option>
                            <option value="Dr. Babasaheb Ambedkar Technological University (DBATU)"></option>
                            <option value="Swami Ramanand Teerth Marathwada University (SRTMUN)"></option>
                            <option value="Delhi University (DU)"></option>
                            <option value="Visvesvaraya Technological University (VTU)"></option>
                        </datalist>
                    </div>
                    <div class="input-group">
                        <label for="year">Year / Semester</label>
                        <input type="text" id="year" placeholder="e.g. Year 2 / Sem 3" required>
                    </div>
                    <div class="input-group full-width">
                        <label for="course">Course / Degree Name</label>
                        <input type="text" id="course" placeholder="e.g. B.Tech Computer Science" required>
                    </div>
                </div>
            </div>

            <div class="form-section divider">
                <div class="section-header">
                    <h2>Subjects & Grades</h2>
                    <button type="button" id="add-subject-btn" class="btn-secondary">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                        Add Subject
                    </button>
                </div>
                
                <div id="subjects-container">
                    <!-- Subject rows will be injected here -->
                </div>
            </div>

            <div class="formula-info">
                <strong>Calculation Formula:</strong><br>
                <span>SGPA / CGPA = &Sigma; (Credits &times; Grade Points) / &Sigma; Total Credits</span>
            </div>

            <div class="actions">
                <button type="submit" class="btn-primary" id="calculate-btn">Calculate SGPA / CGPA</button>
            </div>
        </form>

        <div id="result-modal" class="modal hidden">
            <div class="modal-content glass-card">
                <button class="close-btn" id="close-modal">&times;</button>
                <div class="result-header">
                    <h2>Calculation Result</h2>
                    <p id="result-student-info">University - Course (Year)</p>
                </div>
                
                <div class="score-display">
                    <div class="score-circle">
                        <svg viewBox="0 0 36 36" class="circular-chart">
                            <path class="circle-bg"
                                d="M18 2.0845
                                a 15.9155 15.9155 0 0 1 0 31.831
                                a 15.9155 15.9155 0 0 1 0 -31.831"
                            />
                            <path class="circle"
                                id="score-path"
                                stroke-dasharray="0, 100"
                                d="M18 2.0845
                                a 15.9155 15.9155 0 0 1 0 31.831
                                a 15.9155 15.9155 0 0 1 0 -31.831"
                            />
                            <text x="18" y="20.35" class="percentage" id="final-gpa">0.00</text>
                            <text x="18" y="24.5" class="label">GPA</text>
                        </svg>
                    </div>
                </div>

                <div class="stats-grid">
                    <div class="stat-box">
                        <span class="stat-label">Total Credits</span>
                        <span class="stat-value" id="total-credits">0</span>
                    </div>
                    <div class="stat-box">
                        <span class="stat-label">Grade Points</span>
                        <span class="stat-value" id="total-points">0</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
